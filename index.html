<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Misterioso</title>
<style>
body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
padding-top:80px;
}
#gameBox{
margin:auto;
width:300px;
height:300px;
border:3px solid white;
position:relative;
overflow:hidden;
}
.target{
width:40px;
height:40px;
background:#ff4757;
position:absolute;
border-radius:50%;
cursor:pointer;
}
button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
margin:10px;
}
#invite{
display:none;
animation:fade 1s ease-in;
margin-top:20px;
}
@keyframes fade{
from{opacity:0}
to{opacity:1}
}
</style>
</head>
<body>

<h1>Mini Juego</h1>
<p>Reglas: Atrapa 10 puntos en 10 segundos.</p>

<button onclick="startGame()">Empezar</button>

<div id="gameBox"></div>

<h2 id="score"></h2>

<div id="invite">
<h1>🎉 ¡Estás invitado a mi cumpleaños! 🎉</h1>
<p><b>Fecha:</b> 4 de Abril del 2026</p>
<p><b>Hora:</b> 3:00 PM</p>
<p><b>Lugar:</b> Casa del Geris</p>
<button onclick="window.open('https://www.google.com/maps/place/Monte+Calvario,+San+Mateo+Cuautepec,+54948+Fuentes+del+Valle,+M%C3%A9x./@19.6220168,-99.1416454,17z/data=!3m1!4b1!4m6!3m5!1s0x85d1f68265d8a611:0xe6b7f6c72f986b35!8m2!3d19.6220168!4d-99.1390705!16s%2Fg%2F11ggsrbbts?entry=ttu&g_ep=EgoyMDI2MDMwNS4wIKXMDSoASAFQAw%3D%3D', '_blank')">Ver ubicación 📍</button>
<p>Porque perdiste el juego... ahora tienes que venir 😈</p>
</div>

<script>
let score=0;
let time=10;
let gameInterval;

function startGame(){
score=0;
time=10;
document.getElementById("score").innerText="Puntos: 0";
document.getElementById("gameBox").innerHTML="";

spawnTarget();

gameInterval=setInterval(()=>{
time--;
if(time<=0){
endGame();
}
},1000);
}

function spawnTarget(){
const box=document.getElementById("gameBox");
const target=document.createElement("div");

target.classList.add("target");

target.style.left=Math.random()*260+"px";
target.style.top=Math.random()*260+"px";

target.onclick=function(){
score++;
document.getElementById("score").innerText="Puntos: "+score;
box.removeChild(target);
spawnTarget();
}

box.innerHTML="";
box.appendChild(target);
}

function endGame(){
clearInterval(gameInterval);
document.getElementById("gameBox").innerHTML="";
document.getElementById("score").innerText="Perdiste 😢";
document.getElementById("invite").style.display="block";
}
</script>

</body>
</html>
